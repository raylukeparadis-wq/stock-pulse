<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Pulse</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <div id="stock-pulse-report">Loading...</div>
    <div id="debug-log" style="font-family: monospace; font-size: 11px; white-space: pre-wrap; padding: 8px; background: #111; color: #0f0; max-height: 300px; overflow-y: auto;"></div>

    <script>
      const WORKER_BASE = 'https://stock-pulse-worker.raylukeparadis.workers.dev';
      const ALPACA_PROXY_BASE = 'https://alpaca-proxy.raylukeparadis.workers.dev';
      const FETCH_DELAY_MS = 150;
      const RETRY_COUNT = 3;
      const RETRY_DELAY_MS = 1000;

      function setStatus(msg) {
        const el = document.getElementById('stock-pulse-report');
        if (el) el.innerHTML = msg;
      }

      // Persistent log -- never overwritten, so we can see the FULL sequence
      // of what happened even after a failure, instead of just the last line.
      function log(msg) {
        const el = document.getElementById('debug-log');
        if (el) {
          const time = new Date().toISOString().slice(11, 19);
          el.textContent += `[${time}] ${msg}\n`;
          el.scrollTop = el.scrollHeight;
        }
      }

      function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      async function fetchWithRetry(url, options, label) {
        let lastError;
        for (let attempt = 0; attempt <= RETRY_COUNT; attempt++) {
          try {
            log(`${label}: attempt ${attempt + 1}, calling ${url}`);
            const resp = await fetch(url, options);
            log(`${label}: got HTTP ${resp.status}`);
            if (!resp.ok) {
              const text = await resp.text().catch(() => '(could not read body)');
              lastError = new Error(`${label} returned HTTP ${resp.status}: ${text}`);
            } else {
              return resp;
            }
          } catch (e) {
            log(`${label}: threw ${e.name || 'Error'}: ${e.message || String(e)}`);
            lastError = e;
          }
          if (attempt < RETRY_COUNT) {
            setStatus(`${label} failed (attempt ${attempt + 1}/${RETRY_COUNT + 1}), retrying...`);
            await sleep(RETRY_DELAY_MS);
          }
        }
        throw lastError;
      }

      async function fetchLatestBarFromAlpaca(symbol) {
        try {
          const resp = await fetch(`${ALPACA_PROXY_BASE}/bars?symbol=${symbol}&limit=1`);
          if (!resp.ok) {
            log(`alpaca ${symbol}: HTTP ${resp.status}`);
            return { error: `HTTP ${resp.status}` };
          }
          const payload = await resp.json();
          const bars = payload.bars || [];
          return bars.length ? bars[bars.length - 1] : { error: 'no bars in response' };
        } catch (e) {
          log(`alpaca ${symbol}: threw ${e.name || 'Error'}: ${e.message || String(e)}`);
          return { error: e.message || String(e) };
        }
      }

      async function runOneChunk() {
        log('--- runOneChunk started ---');
        setStatus('Checking status...');
        const statusResp = await fetchWithRetry(`${WORKER_BASE}/status`, {}, '/status');
        const status = await statusResp.json();
        log(`status: cursor=${status.cursor} chunk=${status.currentChunkNumber}/${status.totalChunks} alreadyDone=${status.alreadyRefreshedToday}`);

        if (status.alreadyRefreshedToday) {
          setStatus(`Already fully refreshed today (${status.today}). Loading report...`);
          return { skipped: true };
        }

        const { chunkSymbols, currentChunkNumber, totalChunks } = status;
        const bars = {};

        for (let i = 0; i < chunkSymbols.length; i++) {
          const sym = chunkSymbols[i];
          setStatus(`Chunk ${currentChunkNumber}/${totalChunks} — fetching ${i + 1}/${chunkSymbols.length} (${sym})...`);
          const result = await fetchLatestBarFromAlpaca(sym);
          bars[sym] = (result && result.error) ? null : result;
          await sleep(FETCH_DELAY_MS);
        }
        log(`chunk fetch loop complete, ${chunkSymbols.length} symbols processed`);

        const payloadSize = JSON.stringify({ bars }).length;
        log(`submit payload size: ${payloadSize} bytes`);

        setStatus(`Chunk ${currentChunkNumber}/${totalChunks} — submitting...`);
        const submitResp = await fetchWithRetry(`${WORKER_BASE}/submit-chunk`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bars }),
        }, '/submit-chunk');
        const result = await submitResp.json();
        log(`submit result: ${JSON.stringify(result)}`);

        if (result.cycleComplete) {
          setStatus(`Chunk ${currentChunkNumber}/${totalChunks} complete — full cycle finished! Loading report...`);
        } else {
          setStatus(`Chunk ${currentChunkNumber}/${totalChunks} complete. Visit again to continue with chunk ${currentChunkNumber + 1}/${totalChunks}.`);
        }
        return { skipped: false, result };
      }

      async function loadReport() {
        const resp = await fetch(`${WORKER_BASE}/report/latest`);
        return resp.json();
      }

      function renderReport() {
        return loadReport().then(function(report) {
          if (report.error) return report;
          function renderSection(title, items) {
            if (!items || items.length === 0) return `<h3>${title}</h3><p><em>None right now.</em></p>`;
            const rows = items.map(function(item) {
              const entryPart = item.entryDate ? ` &nbsp; since ${item.entryDate} @ $${item.entryPrice}` : '';
              return `<li><strong>${item.symbol}</strong> score: ${item.score} @ $${item.lastClose}${entryPart}</li>`;
            }).join('');
            return `<h3>${title} (${items.length})</h3><ul>${rows}</ul>`;
          }
          const existing = document.getElementById('stock-pulse-report').innerHTML;
          setStatus(`
            <p>${existing}</p>
            <div>
              <p><small>Report as of ${report.asOfDate}</small></p>
              ${renderSection('Active Buy Signals', report.long)}
              ${renderSection('Active Short Signals', report.short)}
              ${renderSection('Buy Watch List', report.longWatch)}
              ${renderSection('Short Watch List', report.shortWatch)}
            </div>
          `);
          return report;
        });
      }

      window.addEventListener('load', function() {
        runOneChunk()
          .then(function() { return renderReport(); })
          .catch(function(err) {
            log(`FATAL: ${err.name || 'Error'}: ${err.message || String(err)}`);
            setStatus(`<p style="color:red;">ERROR: ${err.message || String(err)}</p><p><small>See debug log below for details. This can happen from a brief connectivity drop -- just reload the page to retry.</small></p>`);
          });
      });
    </script>
  </body>
</html>
