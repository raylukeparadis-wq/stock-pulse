<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Pulse</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <div id="stock-pulse-report">Loading report...</div>

    <script>
      // Pure display -- this page no longer fetches or submits any price
      // data itself. All data refresh happens server-side via a Cloudflare
      // Cron Trigger (see the scheduled() handler in worker.js), which is
      // now the ONLY writer to the dataset. This avoids the race condition
      // that occurred when both the browser and cron could write to the
      // same KV keys close together in time, which caused duplicate
      // entries in the report.
      const WORKER_BASE = 'https://stock-pulse-worker.raylukeparadis.workers.dev';

      function setStatus(msg) {
        const el = document.getElementById('stock-pulse-report');
        if (el) el.innerHTML = msg;
      }

      async function loadReport() {
        const resp = await fetch(`${WORKER_BASE}/report/latest`);
        return resp.json();
      }

      function renderReport() {
        return loadReport().then(function(report) {
          if (report.error) {
            setStatus('<p>No report available yet. Check back after the next scheduled refresh.</p>');
            return report;
          }

          function renderSection(title, items) {
            if (!items || items.length === 0) return `<h3>${title}</h3><p><em>None right now.</em></p>`;
            const strengthEmoji = { strong: '🟢', neutral: '⚪', weak: '🔴' };
            const strengthColors = { strong: '#16a34a', neutral: '#94a3b8', weak: '#dc2626' };
            const rows = items.map(function(item) {
              const entryPart = item.entryDate ? ` &nbsp; since ${item.entryDate} @ $${item.entryPrice}` : '';
              const sectorPart = item.sector ? ` &nbsp; <em style="color:#666;">(${item.sector})</em>` : '';
              const strengthPart = item.historicalStrength
                ? ` &nbsp; <span style="color:${strengthColors[item.historicalStrength.tier]};">${strengthEmoji[item.historicalStrength.tier]} ${item.historicalStrength.avgReturn >= 0 ? '+' : ''}${item.historicalStrength.avgReturn}% historically (n=${item.historicalStrength.n})</span>`
                : '';
              return `<li><strong>${item.symbol}</strong>${sectorPart} score: ${item.score} @ $${item.lastClose}${entryPart}${strengthPart}</li>`;
            }).join('');
            return `<h3>${title} (${items.length})</h3><ul>${rows}</ul>`;
          }

          function renderStale(staleItems) {
            if (!staleItems || staleItems.length === 0) return '';
            const rows = staleItems.map(function(item) {
              return `<li><strong>${item.symbol}</strong> &nbsp; last updated ${item.lastKnownDate} @ $${item.lastKnownClose}</li>`;
            }).join('');
            return `<h3 style="color:#b45309;">⚠️ Stale Data (${staleItems.length})</h3><p style="font-size:12px;color:#92400e;">These symbols failed to fetch fresh data during the last cycle after retries and are showing older prices.</p><ul>${rows}</ul>`;
          }

          function groupBySector(items) {
            const groups = {};
            for (const item of items) {
              const sector = item.sector || 'Unknown';
              if (!groups[sector]) groups[sector] = [];
              groups[sector].push(item);
            }
            return Object.keys(groups).sort().map(sector => ({ sector, items: groups[sector] }));
          }

          function renderSellNow(trackedPositions) {
            const items = trackedPositions || [];
            const reasonLabels = {
              profit_target: 'profit target',
              trailing_stop: 'trailing stop',
              atr_spike: 'volatility spike',
              score_reversal: 'score reversed',
              ma50_breakdown: 'below 50-day avg',
            };
            const reasonSeverity = { trailing_stop: 1, ma50_breakdown: 2, score_reversal: 3, atr_spike: 4, profit_target: 5 };
            const MAX_ITEMS = 20;

            let toSell = items.filter(item => item.exitStatus && item.exitStatus.closed);
            if (toSell.length === 0) return `<h3>Sell Triggers</h3><p><em>None right now.</em></p>`;

            // Sort by priority GLOBALLY first, so capping to 20 keeps the
            // truly most urgent items regardless of which sectors they're
            // concentrated in -- not just "the first 20 alphabetically by sector".
            toSell.sort((a, b) => (reasonSeverity[a.exitStatus.exitReason] || 3) - (reasonSeverity[b.exitStatus.exitReason] || 3));
            const totalCount = toSell.length;
            toSell = toSell.slice(0, MAX_ITEMS);

            const sectorGroups = groupBySector(toSell);
            const sections = sectorGroups.map(function(group) {
              group.items.sort((a, b) => (reasonSeverity[a.exitStatus.exitReason] || 3) - (reasonSeverity[b.exitStatus.exitReason] || 3));
              const rows = group.items.map(function(item) {
                const gainPct = ((item.exitStatus.exitPrice - item.entryPrice) / item.entryPrice) * 100;
                const gainColor = gainPct >= 0 ? '#16a34a' : '#dc2626';
                const reason = reasonLabels[item.exitStatus.exitReason] || item.exitStatus.exitReason;
                const strengthEmoji = { strong: '🟢', neutral: '⚪', weak: '🔴' };
                const strengthColors = { strong: '#16a34a', neutral: '#94a3b8', weak: '#dc2626' };
                const strengthPart = item.historicalStrength
                  ? ` &nbsp; <span style="color:${strengthColors[item.historicalStrength.tier]};">${strengthEmoji[item.historicalStrength.tier]}</span>`
                  : '';
                return `<li><strong>${item.symbol}</strong> sell @ $${item.exitStatus.exitPrice.toFixed(2)} since ${item.entryDate} @ $${item.entryPrice.toFixed(2)} &nbsp; <span style="color:${gainColor};">${gainPct >= 0 ? '+' : ''}${gainPct.toFixed(2)}%</span> &nbsp; (${reason})${strengthPart}</li>`;
              }).join('');
              return `<h4 style="margin:10px 0 4px;color:#444;">${group.sector} (${group.items.length})</h4><ul>${rows}</ul>`;
            }).join('');

            const truncNote = totalCount > MAX_ITEMS ? `<p style="font-size:11px;color:#888;">Showing top ${MAX_ITEMS} of ${totalCount}, most urgent first.</p>` : '';
            return `<h3>Sell Triggers (${Math.min(totalCount, MAX_ITEMS)}${totalCount > MAX_ITEMS ? ` of ${totalCount}` : ''})</h3>${truncNote}${sections}`;
          }

          function renderSellWatch(trackedPositions) {
            const items = trackedPositions || [];
            const MAX_ITEMS = 20;
            let openItems = items.filter(item => item.exitStatus && !item.exitStatus.closed);
            if (openItems.length === 0) return `<h3>Sell Watch</h3><p><em>None right now.</em></p>`;

            openItems.sort((a, b) => {
              const gainA = Math.abs((a.lastClose - a.entryPrice) / a.entryPrice);
              const gainB = Math.abs((b.lastClose - b.entryPrice) / b.entryPrice);
              return gainB - gainA;
            });
            const totalCount = openItems.length;
            openItems = openItems.slice(0, MAX_ITEMS);

            const sectorGroups = groupBySector(openItems);
            const sections = sectorGroups.map(function(group) {
              group.items.sort((a, b) => {
                const gainA = Math.abs((a.lastClose - a.entryPrice) / a.entryPrice);
                const gainB = Math.abs((b.lastClose - b.entryPrice) / b.entryPrice);
                return gainB - gainA;
              });
              const rows = group.items.map(function(item) {
                const gainPct = ((item.lastClose - item.entryPrice) / item.entryPrice) * 100;
                const gainColor = gainPct >= 0 ? '#16a34a' : '#dc2626';
                const strengthEmoji = { strong: '🟢', neutral: '⚪', weak: '🔴' };
                const strengthColors = { strong: '#16a34a', neutral: '#94a3b8', weak: '#dc2626' };
                const strengthPart = item.historicalStrength
                  ? ` &nbsp; <span style="color:${strengthColors[item.historicalStrength.tier]};">${strengthEmoji[item.historicalStrength.tier]}</span>`
                  : '';
                return `<li><strong>${item.symbol}</strong> @ $${item.lastClose} since ${item.entryDate} @ $${item.entryPrice.toFixed(2)} &nbsp; <span style="color:${gainColor};">${gainPct >= 0 ? '+' : ''}${gainPct.toFixed(2)}%</span>${strengthPart}</li>`;
              }).join('');
              return `<h4 style="margin:10px 0 4px;color:#444;">${group.sector} (${group.items.length})</h4><ul>${rows}</ul>`;
            }).join('');

            const truncNote = totalCount > MAX_ITEMS ? `<p style="font-size:11px;color:#888;">Showing top ${MAX_ITEMS} of ${totalCount}, biggest movers first.</p>` : '';
            return `<h3>Sell Watch (${Math.min(totalCount, MAX_ITEMS)}${totalCount > MAX_ITEMS ? ` of ${totalCount}` : ''})</h3>${truncNote}${sections}`;
          }

          function renderPersistentPortfolio(pp) {
            if (!pp) return '';
            const reasonLabels = {
              profit_target: 'Profit target', trailing_stop: 'Trailing stop',
              atr_spike: 'Volatility spike', score_reversal: 'Score reversed', ma50_breakdown: 'Below 50-day avg',
            };
            const totalColor = pp.totalReturnPct >= 0 ? '#16a34a' : '#dc2626';

            const holdingRows = pp.holdings.map(function(h) {
              const color = h.pnlDollar >= 0 ? '#16a34a' : '#dc2626';
              return `<li><strong>${h.symbol}</strong> &nbsp; <em style="color:#666;">(${h.sector})</em> &nbsp; entered ${h.entryDate} @ $${h.entryPrice.toFixed(2)} &nbsp; now $${h.currentPrice.toFixed(2)} &nbsp; <span style="color:${color};">${h.pnlPct >= 0 ? '+' : ''}${h.pnlPct.toFixed(2)}% ($${h.pnlDollar >= 0 ? '+' : ''}${h.pnlDollar.toFixed(2)})</span></li>`;
            }).join('');

            const recentClosed = pp.closedHistory.slice(-10).reverse();
            const closedRows = recentClosed.map(function(c) {
              const color = c.pnlDollar >= 0 ? '#16a34a' : '#dc2626';
              return `<li><strong>${c.symbol}</strong> &nbsp; ${c.entryDate} @ $${c.entryPrice.toFixed(2)} &rarr; ${c.exitDate} @ $${c.exitPrice.toFixed(2)} &nbsp; <span style="color:${color};">${c.pnlPct >= 0 ? '+' : ''}${c.pnlPct.toFixed(2)}%</span> &nbsp; (${reasonLabels[c.reason] || c.reason})</li>`;
            }).join('');

            return `
              <h3>💼 Persistent Paper Portfolio</h3>
              <p style="font-size:12px;color:#666;">Started with $${pp.startingCash.toLocaleString()}. Evolves day by day: buys $1,000 into new active buy signals when cash is available, sells on real exit triggers, waits for funds when cash runs out. Not real trades.</p>
              <p style="font-weight:bold;">Total value: <span style="color:${totalColor};">$${pp.totalValue.toLocaleString()} (${pp.totalReturnPct >= 0 ? '+' : ''}${pp.totalReturnPct.toFixed(2)}%)</span> &nbsp; | &nbsp; Cash: $${pp.cash.toLocaleString()} &nbsp; | &nbsp; Holdings: ${pp.holdingsCount} (${pp.holdingsValue.toLocaleString()})</p>
              <h4 style="margin:10px 0 4px;">Current Holdings (${pp.holdings.length})</h4>
              <ul>${holdingRows || '<li><em>None right now.</em></li>'}</ul>
              <h4 style="margin:10px 0 4px;">Recent Closed Trades (last ${recentClosed.length} of ${pp.closedHistory.length} total)</h4>
              <ul>${closedRows || '<li><em>None yet.</em></li>'}</ul>
            `;
          }

          function renderPaperTrading(longItems) {
            if (!longItems || longItems.length === 0) return '';
            const POSITION_SIZE = 1000; // hypothetical $ per position, matches original backtest convention

            const reasonLabels = {
              profit_target: 'Profit target hit',
              trailing_stop: 'Trailing stop hit',
              atr_spike: 'Volatility spike exit',
              score_reversal: 'Score reversed',
              ma50_breakdown: 'Broke below 50-day average',
            };

            let totalInvested = 0, totalCurrentValue = 0, openCount = 0, closedCount = 0;
            const rows = longItems.map(function(item) {
              if (!item.entryPrice) return '';
              const shares = POSITION_SIZE / item.entryPrice;
              const pt = item.exitStatus || { closed: false };
              const exitPrice = pt.closed ? pt.exitPrice : item.lastClose;
              const currentValue = shares * exitPrice;
              const pnlDollar = currentValue - POSITION_SIZE;
              const pnlPct = (pnlDollar / POSITION_SIZE) * 100;
              totalInvested += POSITION_SIZE;
              totalCurrentValue += currentValue;
              const color = pnlDollar >= 0 ? '#16a34a' : '#dc2626';
              const statusPart = pt.closed
                ? ` &nbsp; <span style="color:#666;">[CLOSED ${pt.exitDate} — ${reasonLabels[pt.exitReason] || pt.exitReason}]</span>`
                : ` &nbsp; <span style="color:#2563eb;">[OPEN]</span>`;
              if (pt.closed) closedCount++; else openCount++;
              return `<li><strong>${item.symbol}</strong> &nbsp; entered ${item.entryDate} @ $${item.entryPrice.toFixed(2)} &nbsp; exit $${exitPrice.toFixed(2)} &nbsp; <span style="color:${color};">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}% ($${pnlDollar >= 0 ? '+' : ''}${pnlDollar.toFixed(2)})</span>${statusPart}</li>`;
            }).join('');

            const totalPnl = totalCurrentValue - totalInvested;
            const totalPnlPct = totalInvested > 0 ? (totalPnl / totalInvested) * 100 : 0;
            const totalColor = totalPnl >= 0 ? '#16a34a' : '#dc2626';

            return `
              <h3>📊 Paper Trading — Buy Positions</h3>
              <p style="font-size:12px;color:#666;">Hypothetical $${POSITION_SIZE} per position, sized at each signal's actual entry price. Applies the 5 documented exit rules (profit target, trailing stop, ATR spike, score reversal, MA50 breakdown) — closed positions use the real simulated exit price, not today's price. Not real trades.</p>
              <p style="font-weight:bold;">Portfolio total (${openCount} open, ${closedCount} closed): <span style="color:${totalColor};">${totalPnlPct >= 0 ? '+' : ''}${totalPnlPct.toFixed(2)}% ($${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)} on $${totalInvested.toFixed(0)} invested)</span></p>
              <ul>${rows}</ul>
            `;
          }

          setStatus(`
            <div>
              <p><small>Report as of ${report.asOfDate}</small></p>
              ${renderSection('Active Buy Signals', report.long)}
              ${renderSection('Buy Watch List', report.longWatch)}
              ${renderSellNow(report.trackedPositions)}
              ${renderSellWatch(report.trackedPositions)}
              <hr style="margin:20px 0;border:none;border-top:1px solid #ddd;">
              ${renderPersistentPortfolio(report.paperPortfolio)}
              ${renderPaperTrading(report.long)}
              ${renderStale(report.stale)}
            </div>
          `);
          return report;
        }).catch(function(err) {
          setStatus(`<p style="color:red;">Failed to load report: ${err.message || String(err)}</p>`);
        });
      }

      window.addEventListener('load', function() {
        renderReport();
      });
    </script>
  </body>
</html>
