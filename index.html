<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Pulse</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <div id="stock-pulse-report">Loading report...</div>

    <script>
      // Pure display -- this page no longer fetches or submits any price
      // data itself. All data refresh happens server-side via a Cloudflare
      // Cron Trigger (see the scheduled() handler in worker.js), which is
      // now the ONLY writer to the dataset. This avoids the race condition
      // that occurred when both the browser and cron could write to the
      // same KV keys close together in time, which caused duplicate
      // entries in the report.
      const WORKER_BASE = 'https://stock-pulse-worker.raylukeparadis.workers.dev';

      function setStatus(msg) {
        const el = document.getElementById('stock-pulse-report');
        if (el) el.innerHTML = msg;
      }

      async function loadReport() {
        const resp = await fetch(`${WORKER_BASE}/report/latest`);
        return resp.json();
      }

      function renderReport() {
        return loadReport().then(function(report) {
          if (report.error) {
            setStatus('<p>No report available yet. Check back after the next scheduled refresh.</p>');
            return report;
          }

          function renderSection(title, items) {
            if (!items || items.length === 0) return `<h3>${title}</h3><p><em>None right now.</em></p>`;
            const rows = items.map(function(item) {
              const entryPart = item.entryDate ? ` &nbsp; since ${item.entryDate} @ $${item.entryPrice}` : '';
              const sectorPart = item.sector ? ` &nbsp; <em style="color:#666;">(${item.sector})</em>` : '';
              return `<li><strong>${item.symbol}</strong>${sectorPart} score: ${item.score} @ $${item.lastClose}${entryPart}</li>`;
            }).join('');
            return `<h3>${title} (${items.length})</h3><ul>${rows}</ul>`;
          }

          function renderStale(staleItems) {
            if (!staleItems || staleItems.length === 0) return '';
            const rows = staleItems.map(function(item) {
              return `<li><strong>${item.symbol}</strong> &nbsp; last updated ${item.lastKnownDate} @ $${item.lastKnownClose}</li>`;
            }).join('');
            return `<h3 style="color:#b45309;">⚠️ Stale Data (${staleItems.length})</h3><p style="font-size:12px;color:#92400e;">These symbols failed to fetch fresh data during the last cycle after retries and are showing older prices.</p><ul>${rows}</ul>`;
          }

          function renderSellNow(trackedPositions) {
            const items = trackedPositions || [];
            const toSell = items.filter(item => item.exitStatus && item.exitStatus.closed);
            if (toSell.length === 0) return `<h3>Sell Triggers</h3><p><em>None right now.</em></p>`;
            const rows = toSell.map(function(item) {
              const sectorPart = item.sector ? ` &nbsp; <em style="color:#666;">(${item.sector})</em>` : '';
              return `<li><strong>${item.symbol}</strong>${sectorPart} sell @ $${item.exitStatus.exitPrice.toFixed(2)} since ${item.entryDate} @ $${item.entryPrice.toFixed(2)}</li>`;
            }).join('');
            return `<h3>Sell Triggers (${toSell.length})</h3><ul>${rows}</ul>`;
          }

          function renderSellWatch(trackedPositions) {
            const items = trackedPositions || [];
            const openItems = items.filter(item => item.exitStatus && !item.exitStatus.closed);
            if (openItems.length === 0) return `<h3>Sell Watch</h3><p><em>None right now.</em></p>`;
            const rows = openItems.map(function(item) {
              const sectorPart = item.sector ? ` &nbsp; <em style="color:#666;">(${item.sector})</em>` : '';
              return `<li><strong>${item.symbol}</strong>${sectorPart} @ $${item.lastClose} since ${item.entryDate} @ $${item.entryPrice.toFixed(2)}</li>`;
            }).join('');
            return `<h3>Sell Watch (${openItems.length})</h3><ul>${rows}</ul>`;
          }

          function renderPaperTrading(longItems) {
            if (!longItems || longItems.length === 0) return '';
            const POSITION_SIZE = 1000; // hypothetical $ per position, matches original backtest convention

            const reasonLabels = {
              profit_target: 'Profit target hit',
              trailing_stop: 'Trailing stop hit',
              atr_spike: 'Volatility spike exit',
              score_reversal: 'Score reversed',
              ma50_breakdown: 'Broke below 50-day average',
            };

            let totalInvested = 0, totalCurrentValue = 0, openCount = 0, closedCount = 0;
            const rows = longItems.map(function(item) {
              if (!item.entryPrice) return '';
              const shares = POSITION_SIZE / item.entryPrice;
              const pt = item.exitStatus || { closed: false };
              const exitPrice = pt.closed ? pt.exitPrice : item.lastClose;
              const currentValue = shares * exitPrice;
              const pnlDollar = currentValue - POSITION_SIZE;
              const pnlPct = (pnlDollar / POSITION_SIZE) * 100;
              totalInvested += POSITION_SIZE;
              totalCurrentValue += currentValue;
              const color = pnlDollar >= 0 ? '#16a34a' : '#dc2626';
              const statusPart = pt.closed
                ? ` &nbsp; <span style="color:#666;">[CLOSED ${pt.exitDate} — ${reasonLabels[pt.exitReason] || pt.exitReason}]</span>`
                : ` &nbsp; <span style="color:#2563eb;">[OPEN]</span>`;
              if (pt.closed) closedCount++; else openCount++;
              return `<li><strong>${item.symbol}</strong> &nbsp; entered ${item.entryDate} @ $${item.entryPrice.toFixed(2)} &nbsp; exit $${exitPrice.toFixed(2)} &nbsp; <span style="color:${color};">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}% ($${pnlDollar >= 0 ? '+' : ''}${pnlDollar.toFixed(2)})</span>${statusPart}</li>`;
            }).join('');

            const totalPnl = totalCurrentValue - totalInvested;
            const totalPnlPct = totalInvested > 0 ? (totalPnl / totalInvested) * 100 : 0;
            const totalColor = totalPnl >= 0 ? '#16a34a' : '#dc2626';

            return `
              <h3>📊 Paper Trading — Buy Positions</h3>
              <p style="font-size:12px;color:#666;">Hypothetical $${POSITION_SIZE} per position, sized at each signal's actual entry price. Applies the 5 documented exit rules (profit target, trailing stop, ATR spike, score reversal, MA50 breakdown) — closed positions use the real simulated exit price, not today's price. Not real trades.</p>
              <p style="font-weight:bold;">Portfolio total (${openCount} open, ${closedCount} closed): <span style="color:${totalColor};">${totalPnlPct >= 0 ? '+' : ''}${totalPnlPct.toFixed(2)}% ($${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)} on $${totalInvested.toFixed(0)} invested)</span></p>
              <ul>${rows}</ul>
            `;
          }

          setStatus(`
            <div>
              <p><small>Report as of ${report.asOfDate}</small></p>
              ${renderSection('Active Buy Signals', report.long)}
              ${renderSection('Buy Watch List', report.longWatch)}
              ${renderSellNow(report.trackedPositions)}
              ${renderSellWatch(report.trackedPositions)}
              <hr style="margin:20px 0;border:none;border-top:1px solid #ddd;">
              ${renderPaperTrading(report.long)}
              ${renderStale(report.stale)}
            </div>
          `);
          return report;
        }).catch(function(err) {
          setStatus(`<p style="color:red;">Failed to load report: ${err.message || String(err)}</p>`);
        });
      }

      window.addEventListener('load', function() {
        renderReport();
      });
    </script>
  </body>
</html>
