<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Pulse</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <div id="stock-pulse-report">Loading...</div>

    <script>
      // ===== client_refresh.js, inlined =====
      const WORKER_BASE = 'https://stock-pulse-worker.raylukeparadis.workers.dev';
      const ALPACA_PROXY_BASE = 'https://alpaca-proxy.raylukeparadis.workers.dev';
      const FETCH_DELAY_MS = 150;

      async function fetchLatestBarFromAlpaca(symbol) {
        try {
          const resp = await fetch(`${ALPACA_PROXY_BASE}/bars?symbol=${symbol}&limit=1`);
          if (!resp.ok) return null;
          const payload = await resp.json();
          const bars = payload.bars || [];
          return bars.length ? bars[bars.length - 1] : null;
        } catch (e) {
          console.warn(`[refresh] fetch failed for ${symbol}:`, e);
          return null;
        }
      }

      function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      async function runDailyRefreshIfNeeded(onProgress = null) {
        const statusResp = await fetch(`${WORKER_BASE}/status`);
        const status = await statusResp.json();

        if (status.alreadyRefreshedToday) {
          return { skipped: true, reason: `Already refreshed today (${status.today}).` };
        }

        const { symbols } = status;
        const bars = {};

        for (let i = 0; i < symbols.length; i++) {
          const sym = symbols[i];
          bars[sym] = await fetchLatestBarFromAlpaca(sym);
          await sleep(FETCH_DELAY_MS);
          if (onProgress) onProgress({ symbolsDone: i + 1, totalSymbols: symbols.length });
        }

        const submitResp = await fetch(`${WORKER_BASE}/submit-daily-update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bars }),
        });
        const result = await submitResp.json();
        return { skipped: false, completed: true, result };
      }

      async function loadReport() {
        const resp = await fetch(`${WORKER_BASE}/report/latest`);
        return resp.json();
      }

      // ===== report_display.js, inlined =====
      function renderReport(containerId = 'stock-pulse-report') {
        return loadReport().then(function(report) {
          const container = document.getElementById(containerId);
          if (!container) return report;

          if (report.error) {
            container.innerHTML = '<p>No report available yet. Visit the site to trigger today\'s refresh.</p>';
            return report;
          }

          function renderSection(title, items, colorClass) {
            if (!items || items.length === 0) {
              return `<h3>${title}</h3><p><em>None right now.</em></p>`;
            }
            const rows = items.map(function(item) {
              const trendPart = item.trendPct !== undefined ? ` &nbsp; trend: ${item.trendPct}%` : '';
              const streakPart = item.streakDays !== undefined ? ` &nbsp; (${item.streakDays}d)` : '';
              return `<li><strong>${item.symbol}</strong> &nbsp; score: ${item.score}${trendPart}${streakPart} &nbsp; @ $${item.lastClose}</li>`;
            }).join('');
            return `<h3 class="${colorClass}">${title} (${items.length})</h3><ul>${rows}</ul>`;
          }

          container.innerHTML = `
            <div class="stock-pulse-report">
              <p><small>As of ${report.asOfDate}</small></p>
              ${renderSection('Active Buy Signals', report.long, 'long-active')}
              ${renderSection('Active Short Signals', report.short, 'short-active')}
              ${renderSection('Buy Watch List', report.longWatch, 'long-watch')}
              ${renderSection('Short Watch List', report.shortWatch, 'short-watch')}
            </div>
          `;
          return report;
        }).catch(function(err) {
          console.error('[report_display] Failed to load report:', err);
          const container = document.getElementById(containerId);
          if (container) container.innerHTML = '<p>Failed to load report. Check console for details.</p>';
        });
      }

      // ===== trigger on load =====
      window.addEventListener('load', function() {
        runDailyRefreshIfNeeded().then(function(result) {
          console.log('Stock Pulse refresh:', result);
          renderReport();
        });
      });
    </script>
  </body>
</html>
